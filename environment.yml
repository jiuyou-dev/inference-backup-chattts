# ============================================================
# Conda 环境配置
# ============================================================
# 用法: conda env create -f environment.yml
#      conda activate voice-generation

name: voice-generation
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  # Python 3.11 (3.9+ 也支持)
  - python>=3.9,<3.13
  
  # 核心 PyTorch (CUDA 12.1)
  - pytorch>=2.1.0
  - pytorch-cuda=12.1
  - torchaudio
  
  # 数值计算
  - numpy<3.0.0
  - scipy>=1.7.0
  
  # 音频处理
  - libsndfile>=1.0.0
  - ffmpeg
  
  # pip 专用包
  - pip>=21.0

variables:
  # Windows: set CUDA_PATH=C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v12.1
  # Linux/Mac: 已自动配置

prefix: ~/.conda/envs/voice-generation
